# GatewayClass — tells Kubernetes which controller implements the Gateway API.
#
# Envoy Gateway watches for Gateways referencing this class and provisions
# Envoy proxy instances to handle traffic. The parametersRef points to an
# EnvoyProxy resource that configures the data-plane (LB annotations, etc.).

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: proxy-config
    namespace: envoy-gateway-system
