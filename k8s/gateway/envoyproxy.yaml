# EnvoyProxy — configures the data-plane proxy provisioned by Envoy Gateway.
#
# The Scaleway CCM detects the LoadBalancer Service annotations and provisions
# a managed Load Balancer accordingly.
#
# Annotations:
#   - LB-S: smallest (and cheapest) LB type (~8.50 EUR/mo)
#   - proxy-protocol-v2: the LB prepends a PROXY protocol v2 header to each
#     TCP connection so the real client IP can be recovered downstream
#   - use-hostname: populates Service status with a hostname (not an IP),
#     which is needed for CNAME DNS records

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: proxy-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          service.beta.kubernetes.io/scw-loadbalancer-type: "LB-S"
          service.beta.kubernetes.io/scw-loadbalancer-zone: "fr-par-1"
          service.beta.kubernetes.io/scw-loadbalancer-proxy-protocol-v2: "true"
          service.beta.kubernetes.io/scw-loadbalancer-use-hostname: "true"
