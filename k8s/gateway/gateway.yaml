# Gateway — the single entry point for external traffic.
#
# Two listeners:
#   - http  (port 80):  catches plain HTTP traffic for redirect to HTTPS
#   - https (port 443): terminates TLS for the apex domain
#
# cert-manager watches this Gateway (via the annotation) and automatically
# provisions a Let's Encrypt certificate for the HTTPS listener's hostname.
# The certificate is stored in the referenced Secret.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: envoy-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: sovereigncloudwisdom.eu
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: sovereign-wisdom-tls
